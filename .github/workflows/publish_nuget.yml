name: Publish NuGet Packages

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build_and_publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            10.0.x

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Pack
        run: |
          dotnet pack Velox.Sql.Core/Velox.Sql.Core.csproj --configuration Release --output nupkgs --no-build
          dotnet pack Velox.Sql/Velox.Sql.csproj --configuration Release --output nupkgs --no-build
          dotnet pack Velox.Sql.DependencyInjection/Velox.Sql.DependencyInjection.csproj --configuration Release --output nupkgs --no-build

      - name: Push to NuGet.org
        run: dotnet nuget push "nupkgs/*.nupkg" --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate
